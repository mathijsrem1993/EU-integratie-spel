<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EU Integratie Spel</title>
  
  <!-- React and ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
    }
    
    #root {
      width: 100%;
      height: 100vh;
    }
    
    /* Loading indicator */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(to bottom, #f0f9ff, #e0f2fe);
      color: #1e40af;
      font-size: 1.5rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">
      🇪🇺 Spel laden...
    </div>
  </div>

  <!-- Load game files in reverse order (Level5 first, wrapper last) -->
  <script type="text/babel" src="./Level5.jsx"></script>
  <script type="text/babel" src="./Level4.jsx"></script>
  <script type="text/babel" src="./Level3.jsx"></script>
  <script type="text/babel" src="./Level2.jsx"></script>
  <script type="text/babel" src="./Level1.jsx"></script>
  <script type="text/babel" src="./EUGameWrapper.jsx"></script>

  <!-- Initialize Lucide icons and start the game -->
  <script type="text/babel">
    // Make Lucide icons available globally
    const { ChevronLeft, ChevronRight, HelpCircle, X } = lucide;
    
    // Create all icon components
    lucide.createIcons();
    
    // Render the game
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<EUGameComplete />);
  </script>
</body>
</html>
