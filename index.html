<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EU Integratie Spel</title>
  
  <!-- React and ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
    }
    
    #root {
      width: 100%;
      height: 100vh;
    }
    
    /* Loading indicator */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(to bottom, #f0f9ff, #e0f2fe);
      color: #1e40af;
      font-size: 1.5rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">
      🇪🇺 Spel laden...
    </div>
  </div>

  <!-- Create icon components globally before loading game files -->
  <script type="text/babel">
    // Create simple icon components using inline SVG
    window.ChevronLeft = (props) => (
      <svg {...props} className={props.className || "w-5 h-5"} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
      </svg>
    );
    
    window.ChevronRight = (props) => (
      <svg {...props} className={props.className || "w-5 h-5"} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
      </svg>
    );
    
    window.HelpCircle = (props) => (
      <svg {...props} className={props.className || "w-5 h-5"} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" strokeWidth={2} />
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
        <circle cx="12" cy="17" r="0.5" fill="currentColor" />
      </svg>
    );
    
    window.X = (props) => (
      <svg {...props} className={props.className || "w-5 h-5"} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
      </svg>
    );
  </script>

  <!-- Load game files in reverse order (Level5 first, wrapper last) -->
  <script type="text/babel" src="./Level5.jsx"></script>
  <script type="text/babel" src="./Level4.jsx"></script>
  <script type="text/babel" src="./Level3.jsx"></script>
  <script type="text/babel" src="./Level2.jsx"></script>
  <script type="text/babel" src="./Level1.jsx"></script>
  <script type="text/babel" src="./EUGameWrapper.jsx"></script>

  <!-- Render the game -->
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<EUGameComplete />);
  </script>
</body>
</html>
