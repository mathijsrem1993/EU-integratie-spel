<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EU Spel Test</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100vh; }
    #root { width: 100%; height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function TestGame() {
      const [level, setLevel] = useState(1);
      const [fade, setFade] = useState('visible');

      const nextLevel = () => {
        setFade('out');
        setTimeout(() => {
          setLevel(level + 1);
          setFade('in');
          setTimeout(() => setFade('visible'), 300);
        }, 700);
      };

      return (
        <div 
          className="w-full h-screen flex items-center justify-center bg-gradient-to-b from-blue-100 to-blue-50"
          style={{
            opacity: fade === 'out' ? 0 : 1,
            transition: 'opacity 300ms ease-in-out'
          }}
        >
          <div className="text-center">
            <h1 className="text-4xl font-bold text-blue-900 mb-8">
              🇪🇺 Level {level}
            </h1>
            <p className="text-xl text-gray-700 mb-8">
              {level === 1 && "Welkom bij het EU Spel!"}
              {level === 2 && "Je bent nu in Level 2"}
              {level === 3 && "Level 3 bereikt!"}
              {level === 4 && "Bijna klaar - Level 4"}
              {level === 5 && "Gefeliciteerd! Level 5 voltooid!"}
            </p>
            {level < 5 && (
              <button
                onClick={nextLevel}
                className="px-8 py-4 bg-blue-600 text-white text-xl font-bold rounded-full hover:bg-blue-700 transition-all"
              >
                Volgende Level →
              </button>
            )}
            {level === 5 && (
              <p className="text-2xl text-green-600 font-bold">🎉 Spel Voltooid!</p>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TestGame />);
  </script>
</body>
</html>
